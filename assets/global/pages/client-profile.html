<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Conta | Barbearia Estilo & Classe</title>
  <link rel="stylesheet" href="assets/global/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@400;500;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="client-view">
    <div class="header-brand">
      <i class="fas fa-user-circle logo-icon" style="color: var(--gold);"></i>
      <h1 class="brand-name">Minha Conta</h1>
      <p class="brand-slogan">Demo • Dados locais</p>
    </div>

    <div class="evaluation-card" style="max-width: 720px;">
      <div class="card-title">
        <h2>Olá, Cliente!</h2>
        <p>Informações demo e ações rápidas.</p>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
        <div style="background: var(--gray-dark); border: 1px solid rgba(0,0,0,0.2); padding: 16px; border-radius: 8px;">
          <div style="color: var(--gold-light); font-weight: 700; margin-bottom: 8px;">Seu cadastro</div>
          <div style="color: #fff; font-size: 1rem; font-weight: 600; margin-bottom: 6px;">Cliente Demo</div>
          <div style="color:#bbb; font-size:0.9rem;">email@exemplo.com</div>
        </div>

        <div style="background: var(--gray-dark); border: 1px solid rgba(0,0,0,0.2); padding: 16px; border-radius: 8px;">
          <div style="color: var(--gold-light); font-weight: 700; margin-bottom: 8px;">Status</div>
          <div id="client-summary" style="color:#bbb; font-size:0.9rem; line-height:1.6;">
            Carregando...
          </div>
        </div>
      </div>

      <div style="display:flex; gap: 12px; flex-wrap:wrap;">
        <button class="btn-primary" style="flex:1; min-width: 240px;" onclick="window.location.href='index.html'">
          <i class="fas fa-star" style="margin-right:10px;"></i>
          Fazer Nova Avaliação
        </button>
        <button id="btn-clear-client" class="btn-primary" style="flex:1; min-width: 240px; background:#ef4444; color:#fff;">
          <i class="fas fa-trash" style="margin-right:10px;"></i>
          Limpar Minhas Avaliações (Demo)
        </button>
      </div>

      <div style="margin-top:16px;color:#666;font-size:0.85rem;line-height:1.5;">
        Como esta é uma demo, as avaliações ficam no seu navegador. Esta página não tem autenticação real.
      </div>
    </div>

  </div>

  <script>
    /**
     * client-profile inline script (sem arquivo extra para manter simples).
     * Responsabilidades:
     * - Mostrar resumo de avaliações do cliente demo (com base no localStorage)
     * - Permitir limpar avaliações (localStorage)
     */
    function safeParseReviews() {
      try {
        return JSON.parse(localStorage.getItem('barberReviews')) || [];
      } catch {
        return [];
      }
    }

    function renderSummary() {
      const reviews = safeParseReviews();
      const total = reviews.length;
      const avg = total ? (reviews.reduce((a, r) => a + r.rating, 0) / total).toFixed(1) : '0.0';
      const satisfaction = total ? Math.round((reviews.filter(r => r.rating >= 4).length / total) * 100) : 0;

      const el = document.getElementById('client-summary');
      if (!el) return;

      el.innerHTML = `
        <div>Total avaliações: <strong>${total}</strong></div>
        <div>Média de nota: <strong>${avg}</strong></div>
        <div>Satisfação (>=4): <strong>${satisfaction}%</strong></div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderSummary();

      const btn = document.getElementById('btn-clear-client');
      if (btn) {
        btn.addEventListener('click', () => {
          if (!confirm('Limpar avaliações salvas neste navegador?')) return;
          localStorage.removeItem('barberReviews');
          window.location.href = 'index.html';
        });
      }
    });
  </script>
</body>
</html>
