<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações | Barbearia Estilo &amp; Classe</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@400;500;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="admin-view">
    <header class="mobile-topbar">
      <div class="mobile-topbar-left">
        <button type="button" class="mobile-menu-toggle" aria-label="Abrir menu de navegação">
          <i class="fas fa-bars" aria-hidden="true"></i>
        </button>
        <div class="mobile-title">Configurações</div>
      </div>
    </header>

    <div id="mobile-menu-overlay" class="mobile-menu-overlay hidden" aria-hidden="true"></div>
    <nav class="sidebar" id="admin-sidebar" aria-label="Menu principal"></nav>

    <main class="main-content">
      <header class="admin-header">
        <div>
          <h2 class="text-gold">Configurações</h2>
          <p class="text-muted">Preferências e ações de demo.</p>
        </div>
        <div class="admin-header-actions">
          <button type="button" id="btn-logout" class="btn-primary btn-danger">Sair</button>
        </div>
      </header>

      <section class="charts-container charts-container--single">
        <article class="chart-card">
          <h3 class="chart-title">Preferências (Demo)</h3>

          <div class="form-grid">
            <div class="form-panel">
              <div class="form-panel-title">Tema</div>
              <div class="form-panel-desc">Apenas visual (salva em localStorage).</div>
              <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button type="button" id="btn-theme-dark" class="btn-primary btn-secondary">Dark</button>
                <button type="button" id="btn-theme-gold" class="btn-primary btn-secondary">Gold Focus</button>
              </div>
            </div>

            <div class="form-panel">
              <div class="form-panel-title">Ações</div>
              <div class="form-panel-desc">Reset de dados do demo e navegação.</div>
              <button type="button" id="btn-reset-all" class="btn-primary btn-danger" style="width:100%;margin-bottom:10px;">Resetar Avaliações</button>
              <button type="button" id="btn-go-client" class="btn-primary btn-secondary" style="width:100%;">Ir para Página do Cliente</button>
            </div>
          </div>
        </article>
      </section>

      <p class="info-note">
        <strong>Observação:</strong> o sistema atual é local (demo). Tudo que você salva fica no navegador via localStorage.
      </p>
    </main>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/settings.js"></script>
</body>
</html>
