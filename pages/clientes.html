<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes | Barbearia Estilo &amp; Classe</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@400;500;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="admin-view">
    <header class="mobile-topbar">
      <div class="mobile-topbar-left">
        <button type="button" class="mobile-menu-toggle" aria-label="Abrir menu de navegação">
          <i class="fas fa-bars" aria-hidden="true"></i>
        </button>
        <div class="mobile-title">Clientes</div>
      </div>
    </header>

    <div id="mobile-menu-overlay" class="mobile-menu-overlay hidden" aria-hidden="true"></div>
    <nav class="sidebar" id="admin-sidebar" aria-label="Menu principal"></nav>

    <main class="main-content">
      <header class="admin-header">
        <div>
          <h2 class="text-gold">Clientes</h2>
          <p class="text-muted">Cadastro, histórico e avaliações dos clientes.</p>
        </div>
        <div class="admin-header-actions">
          <button type="button" id="btn-logout" class="btn-primary btn-danger">Sair</button>
        </div>
      </header>

      <section class="metrics-grid" aria-label="Métricas de clientes">
        <article class="metric-card">
          <div class="metric-label">Total de Clientes</div>
          <div class="metric-value" id="metric-clientes-total">0</div>
        </article>
        <article class="metric-card">
          <div class="metric-label">Avaliações Realizadas</div>
          <div class="metric-value" id="metric-clientes-avaliacoes">0</div>
        </article>
      </section>

      <section class="charts-container">
        <article class="chart-card">
          <h3 class="chart-title">Cadastrar Cliente (Demo)</h3>
          <form id="form-cliente">
            <div class="form-field">
              <label for="cliente-nome">Nome completo</label>
              <input type="text" id="cliente-nome" name="nome" placeholder="Ex: João Silva" required>
            </div>
            <div class="form-field">
              <label for="cliente-email">Email</label>
              <input type="email" id="cliente-email" name="email" placeholder="cliente@email.com" required>
            </div>
            <div class="form-field">
              <label for="cliente-phone">Telefone</label>
              <input type="tel" id="cliente-phone" name="phone" placeholder="(11) 99999-9999">
            </div>
            <button type="submit" class="btn-primary btn-secondary">Cadastrar Cliente</button>
          </form>
        </article>

        <article class="chart-card">
          <h3 class="chart-title">Lista de Clientes</h3>
          <div class="filter-bar">
            <label for="search-clientes" class="sr-only">Pesquisar clientes</label>
            <input type="search" id="search-clientes" class="search-input" placeholder="Pesquisar por nome ou email...">
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th scope="col">Nome</th>
                  <th scope="col">Email</th>
                  <th scope="col">Telefone</th>
                  <th scope="col">Avaliações</th>
                  <th scope="col">Média</th>
                  <th scope="col">Última Avaliação</th>
                </tr>
              </thead>
              <tbody id="clientes-table-body"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/clientes.js"></script>
</body>
</html>
