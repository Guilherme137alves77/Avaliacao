<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avaliações | Barbearia Estilo &amp; Classe</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@400;500;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="admin-view">
    <header class="mobile-topbar">
      <div class="mobile-topbar-left">
        <button type="button" class="mobile-menu-toggle" aria-label="Abrir menu de navegação">
          <i class="fas fa-bars" aria-hidden="true"></i>
        </button>
        <div class="mobile-title">Avaliações</div>
      </div>
    </header>

    <div id="mobile-menu-overlay" class="mobile-menu-overlay hidden" aria-hidden="true"></div>
    <nav class="sidebar" id="admin-sidebar" aria-label="Menu principal"></nav>

    <main class="main-content">
      <header class="admin-header">
        <div>
          <h2 class="text-gold">Avaliações</h2>
          <p class="text-muted">Todas as avaliações feitas pelos clientes da barbearia.</p>
        </div>
        <div class="admin-header-actions">
          <button type="button" id="btn-logout" class="btn-primary btn-danger">Sair</button>
        </div>
      </header>

      <section class="metrics-grid" aria-label="Resumo">
        <article class="metric-card">
          <div class="metric-label">Total</div>
          <div class="metric-value" id="metric-av-total">0</div>
        </article>
        <article class="metric-card">
          <div class="metric-label">Média Geral</div>
          <div class="metric-value" id="metric-av-avg">0.0</div>
        </article>
        <article class="metric-card">
          <div class="metric-label">Satisfação</div>
          <div class="metric-value" id="metric-av-satisfaction">0%</div>
        </article>
      </section>

      <section class="charts-container charts-container--single">
        <article class="chart-card">
          <h3 class="chart-title">Lista de Avaliações</h3>

          <div class="filter-bar">
            <label for="search-avaliacoes" class="sr-only">Pesquisar avaliações</label>
            <input type="search" id="search-avaliacoes" class="search-input" placeholder="Pesquisar por cliente, barbeiro, serviço ou comentário...">

            <label for="filter-rating" class="sr-only">Filtrar por nota</label>
            <select id="filter-rating" class="filter-select" aria-label="Filtrar por nota">
              <option value="">Todas as notas</option>
              <option value="5">5 estrelas</option>
              <option value="4">4 estrelas</option>
              <option value="3">3 estrelas</option>
              <option value="2">2 estrelas</option>
              <option value="1">1 estrela</option>
            </select>

            <label for="filter-barber" class="sr-only">Filtrar por barbeiro</label>
            <select id="filter-barber" class="filter-select" aria-label="Filtrar por barbeiro">
              <option value="">Todos os barbeiros</option>
            </select>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th scope="col">Cliente</th>
                  <th scope="col">Barbeiro</th>
                  <th scope="col">Serviço</th>
                  <th scope="col">Nota</th>
                  <th scope="col">Comentário</th>
                  <th scope="col">Data</th>
                  <th scope="col">Score</th>
                </tr>
              </thead>
              <tbody id="avaliacoes-table-body"></tbody>
            </table>
          </div>

          <nav id="pagination" class="pagination" aria-label="Paginação de avaliações"></nav>
        </article>
      </section>
    </main>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/avaliacoes.js"></script>
</body>
</html>
